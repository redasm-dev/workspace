name: Release

on:
  repository_dispatch:
    types: [ release_tagged ]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yml
    with:
      version: ${{ github.event.client_payload.tag }}
      run_tests: true

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    with:
      version: ${{ github.event.client_payload.tag }}
      run_tests: true

  publish:
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.client_payload.tag }}

    steps:
      - name: Strip v prefix for filenames
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: REDasm-linux-x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: REDasm-windows-x86_64
          path: redasm-windows-x86_64/

      - name: Rename AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: mv REDasm-linux-x86_64.AppImage "REDasm-${VERSION}-linux-x86_64.AppImage"

      - name: Package Windows
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: zip -r "REDasm-${VERSION}-windows-x86_64.zip" redasm-windows-x86_64/

      - name: Checksum artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sha256sum "REDasm-${VERSION}-linux-x86_64.AppImage" > "REDasm-${VERSION}-linux-x86_64.AppImage.sha256"
          sha256sum "REDasm-${VERSION}-windows-x86_64.zip" > "REDasm-${VERSION}-windows-x86_64.zip.sha256"

      - name: Sign checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GPG_PRIVATE_KEY: ${{ secrets.RD_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.RD_GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback \
            --passphrase-fd 0 --detach-sign --armor "REDasm-${VERSION}-linux-x86_64.AppImage.sha256"
          echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback \
            --passphrase-fd 0 --detach-sign --armor "REDasm-${VERSION}-windows-x86_64.zip.sha256"

      - name: Verify signatures and checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gpg --verify "REDasm-${VERSION}-linux-x86_64.AppImage.sha256.asc" "REDasm-${VERSION}-linux-x86_64.AppImage.sha256"
          gpg --verify "REDasm-${VERSION}-windows-x86_64.zip.sha256.asc" "REDasm-${VERSION}-windows-x86_64.zip.sha256"
          sha256sum -c "REDasm-${VERSION}-linux-x86_64.AppImage.sha256"
          sha256sum -c "REDasm-${VERSION}-windows-x86_64.zip.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.RD_WORKSPACE_CI_TOKEN }}
          repository: redasm-dev/redasm
          tag_name: ${{ github.event.client_payload.tag }}
          name: "${{ github.event.client_payload.tag }}"
          prerelease: false
          draft: true
          files: |
            REDasm-${{ steps.version.outputs.version }}-linux-x86_64.AppImage
            REDasm-${{ steps.version.outputs.version }}-linux-x86_64.AppImage.sha256
            REDasm-${{ steps.version.outputs.version }}-linux-x86_64.AppImage.sha256.asc
            REDasm-${{ steps.version.outputs.version }}-windows-x86_64.zip
            REDasm-${{ steps.version.outputs.version }}-windows-x86_64.zip.sha256
            REDasm-${{ steps.version.outputs.version }}-windows-x86_64.zip.sha256.asc
